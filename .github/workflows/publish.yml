name: Publish to GitHub Packages

on:
  push:
    branches: [main]

defaults:
  run:
    working-directory: ./wrapper

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Required to push version bump commit
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # Allows pushing commits back

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@radoslaw-wolnik'

      - name: Install npm dependencies
        run: npm install

      # ---------- Version Bump Step ----------
      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          # Bump patch and add alpha.0
          npm version patch --preid=alpha -m "chore(release): bump to %s [skip ci]"
          git push --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package (WASM + TypeScript)
        run: npm run build
        # Note: build:wasm script assumes ../rust-unsorter exists relative to wrapper

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
