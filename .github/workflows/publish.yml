name: Publish to GitHub Packages

on:
  push:
    branches: [main]

defaults:
  run:
    working-directory: ./wrapper

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Allows pushing the version bump commit
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@radoslaw-wolnik'

      - name: Install npm dependencies
        run: npm install

      # ---------- Bump patch version with alpha ----------
      - name: Bump patch version (alpha)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Read current version from package.json
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          # Strip any existing prerelease suffix, bump patch, re-add -alpha
          BASE=$(echo "$CURRENT" | sed 's/-.*//')   # e.g. 0.2.3
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}-alpha"
          echo "New version: $NEW_VERSION"

          # Write it back and commit
          npm version "$NEW_VERSION" --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore(release): bump to ${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- Publish with alpha dist-tag ----------
      - name: Publish to GitHub Packages
        run: npm publish --tag alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}