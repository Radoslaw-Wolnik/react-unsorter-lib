name: Publish to GitHub Packages

on:
  push:
    branches: [main]

defaults:
  run:
    working-directory: ./wrapper   # <-- All `run` steps will execute inside `wrapper/`

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@radoslaw-wolnik'   # Must be lowercase!

      - name: Install npm dependencies
        run: npm install
        # working-directory is ./wrapper due to defaults

      - name: Build package (WASM + TypeScript)
        run: npm run build
        # Note: build:wasm script assumes ../rust-unsorter exists relative to wrapper

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
