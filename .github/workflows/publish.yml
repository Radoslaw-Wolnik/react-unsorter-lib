name: Publish to GitHub Packages

on:
  push:
    branches: [main]

defaults:
  run:
    working-directory: ./wrapper

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Required to push version bump commit
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # Allows pushing commits back

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@radoslaw-wolnik'

      - name: Install npm dependencies
        run: npm install

      # ---------- Version Bump Step ----------
      - name: Bump patch version (with alpha reset)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [[ "$CURRENT_VERSION" == *"-"* ]]; then
            # Extract base version (e.g., 0.2.1 from 0.2.1-alpha.1)
            BASE_VERSION=$(echo "$CURRENT_VERSION" | cut -d'-' -f1)
            # Bump patch and set prerelease to alpha.1
            npm version ${BASE_VERSION} --no-git-tag-version --allow-same-version > /dev/null 2>&1
            npm version patch --preid=alpha -m "chore(release): bump to %s [skip ci]"
            # The above gives 0.2.2-alpha.0; we'll manually adjust to .1 if you prefer starting at 1
            NEW_VERSION=$(node -p "require('./package.json').version")
            FINAL_VERSION="${NEW_VERSION/%alpha.0/alpha.1}"
            npm version $FINAL_VERSION --no-git-tag-version --allow-same-version
            git add package.json
            git commit -m "chore(release): bump to $FINAL_VERSION [skip ci]"
            git tag "v$FINAL_VERSION"
          else
            # Not a pre-release – just bump patch normally
            npm version patch -m "chore(release): bump to %s [skip ci]"
          fi
      
          git push --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package (WASM + TypeScript)
        run: npm run build
        # Note: build:wasm script assumes ../rust-unsorter exists relative to wrapper

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
